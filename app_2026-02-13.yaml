          modified: 1762439785748
          isPrivate: false
          description: >+
            ## Endpoint: {{ _.ENGINE }}/get_available_profile

            ### Descripción:

            Obtiene las tenencias totales del usuario, incluyendo balances,
            rendimientos diarios, mensuales e históricos, y otros datos
            relevantes para mostrar en la Home (mobile).



            ### Ejemplo de solicitud:

            **GET** `{{ _.ENGINE }}/get_available_profile`


            ### Consumido en:

            - Ingresar/Retirar dinero (web-view)

            - Panel de órdenes (ADMIN)


            ### Posibles códigos de respuesta:

            - **200 OK:** Solicitud exitosa.

            - **401 Unauthorized:** El usuario no está autenticado.

            - **500 Internal Server Error:** Error interno del servidor.



            ### Ejemplo de respuesta:

            ```json

            {
            	"data": {
            		"available_pesos": 8753.486434064569,
            		"available_dollars": 0.45,
            		"to_operate_in_dollars": 0.45
            	}
            }

          sortKey: -1734365098650.5
